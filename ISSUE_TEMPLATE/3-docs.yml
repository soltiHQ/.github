name: "Documentation"
description: "Report unclear or missing documentation"
labels: ["docs"]
body:
  - type: dropdown
    id: where
    attributes:
      label: Where?
      multiple: true
      options:
        - API docs
        - Examples
        - README
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: "How would you phrase or structure it? Optional."
